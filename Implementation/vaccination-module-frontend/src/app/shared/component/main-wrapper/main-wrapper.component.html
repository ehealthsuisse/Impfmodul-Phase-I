@if (isMainContent) {
<main [attr.aria-labelledby]="contentId" [attr.aria-label]="label">
  <ng-container *ngTemplateOutlet="elseTpl"></ng-container>
</main>
} @else {
<div [id]="contentId">
  <ng-content></ng-content>
</div>
}

<ng-template #elseTpl>
  <div [id]="contentId">
    <ng-content></ng-content>
  </div>
</ng-template>
