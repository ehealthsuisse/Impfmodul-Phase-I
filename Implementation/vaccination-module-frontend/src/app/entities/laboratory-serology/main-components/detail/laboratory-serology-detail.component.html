@if (laboratorySerology!) {
<section [ngClass]="isMobile ? 'mobile-detail-wrapper' : 'detail-wrapper'">
  <mat-card class="detail-wrapper__card" [ngClass]="isMobile ? 'mat-elevation-z0' : 'mat-elevation-z10'">
    <mat-card-header class="detail-wrapper__card-title mat-card-title">
      <mat-card-title
        vmTranslate="LABORATORY_SEROLOGY.DETAILS_HEADER"
        [attr.aria-label]="'LABORATORY_SEROLOGY.DETAILS_HEADER' | translate"
      ></mat-card-title>
    </mat-card-header>
    <mat-card-content class="detail-wrapper__card-content mat-card-content">
      <vm-laboratory-serology-detailed-information [laboratorySerology]="laboratorySerology"></vm-laboratory-serology-detailed-information>
    </mat-card-content>
    @if (!isMobile) {
    <vm-details-action class="details__action"></vm-details-action>
    }
  </mat-card>
  <vm-comment class="detail-wrapper__comment" [comment]="laboratorySerology.comment!" [canAddComments]="false"></vm-comment>
</section>
}
