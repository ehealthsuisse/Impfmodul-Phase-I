<div class="detail-wrapper">
  <mat-card class="detail-wrapper__card" [ngClass]="isMobile ? 'mat-elevation-z0' : 'mat-elevation-z10'">
    <mat-card-header class="detail-wrapper__card-title mat-card-title">
      @if (laboratorySerology) {
      <mat-card-title
        vmTranslate="LABORATORY_SEROLOGY.EDIT_HEADER"
        [attr.aria-label]="'LABORATORY_SEROLOGY.EDIT_HEADER' | translate"
      ></mat-card-title>
      } @if (!laboratorySerology) {
      <mat-card-title
        vmTranslate="LABORATORY_SEROLOGY.NEW_HEADER"
        [attr.aria-label]="'LABORATORY_SEROLOGY.NEW_HEADER' | translate"
      ></mat-card-title>
      }
    </mat-card-header>

    <mat-card-content class="detail-wrapper__card-content form-wrapper">
      <form
        [formGroup]="editForm"
        #formGroupDirective="ngForm"
        name="form"
        novalidate
        (ngSubmit)="save()"
        class="form-wrapper__form"
        role="form"
      >
        <vm-reusable-date-field
          [formControl]="editForm.controls.recordedDate"
          [labelTranslationKey]="'LABORATORY_SEROLOGY.RECORDED_DATE'"
          [isEditable]="true"
          formControlName="recordedDate"
        ></vm-reusable-date-field>

        <vm-reusable-select-field-with-search
          #codeSelect
          [isRequired]="true"
          [options$]="filteredCodes"
          [item]="laboratorySerology?.code!"
          [isEditable]="true"
          [translationKey]="'LABORATORY_SEROLOGY'"
          [labelKey]="'LABORATORY_SEROLOGY_CODE'"
          [formControl]="editForm.controls.code"
          formControlName="code"
        ></vm-reusable-select-field-with-search>

        <mat-form-field class="detailed-card-content__form-field">
          <mat-label>{{ 'LABORATORY_SEROLOGY.VALUE' | translate }}</mat-label>
          <input
            matInput
            type="number"
            step="any"
            [attr.aria-label]="'LABORATORY_SEROLOGY.VALUE' | translate"
            [formControl]="editForm.controls.valueCode"
            formControlName="valueCode"
          />
        </mat-form-field>

        <mat-form-field class="detailed-card-content__form-field">
          <mat-label>{{ 'LABORATORY_SEROLOGY.UNIT' | translate }}</mat-label>
          <input matInput readonly [attr.aria-label]="'LABORATORY_SEROLOGY.UNIT' | translate" [value]="unitDisplayName" />
        </mat-form-field>

        <vm-reusable-recorder-field
          [parentForm]="editForm"
          [recorder]="laboratorySerology?.recorder!"
          [organization]="laboratorySerology?.organization!"
          [isEditable]="true"
        >
        </vm-reusable-recorder-field>

        @if (isMobile) {
        <mat-form-field class="detailed-card-content__form-field">
          <mat-label [attr.aria-label]="'GLOBAL.COMMENT' | translate" class="mat-label" vmTranslate="GLOBAL.COMMENT"></mat-label>
          <textarea
            matInput
            [value]="editForm.get('comment')?.value?.text || ''"
            (input)="commentMessage = $event.target.value"
            [attr.aria-label]="'GLOBAL.COMMENT' | translate"
            [placeholder]="'COMMENT.PLACEHOLDER' | translate"
          ></textarea>
        </mat-form-field>
        }

        <vm-reusable-select-field
          [formControl]="editForm.controls.confidentiality"
          [isEditable]="true"
          [placeholder]="'GLOBAL.CONFIDENTIALITY'"
          [options$]="confidentialityList"
          [translationKey]="'CONFIDENTIALITY'"
          [labelTranslationKey]="'GLOBAL.CONFIDENTIALITY'"
          [mainValueKey]="'CONFIDENTIALITY.' + laboratorySerology?.confidentiality?.code! | translate"
          formControlName="confidentiality"
        ></vm-reusable-select-field>

        <vm-common-card-footer
          [isEditFooter]="true"
          [dialogTitle]="helpDialogTitle | translate"
          [dialogBody]="helpDialogBody | translate"
          (edit)="save()"
          [disabled]="editForm.invalid || isSaving"
        >
        </vm-common-card-footer>
      </form>
    </mat-card-content>
  </mat-card>
  <vm-comment
    class="detail-wrapper__comment"
    [(commentMessage)]="commentMessage"
    [comment]="laboratorySerology?.comment!"
    [canAddComments]="true"
  ></vm-comment>
</div>
