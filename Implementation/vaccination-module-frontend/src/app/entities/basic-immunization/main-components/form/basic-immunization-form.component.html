<div class="detail-wrapper">
  <mat-card class="detail-wrapper__card" [ngClass]="isMobile ? 'mat-elevation-z0' : 'mat-elevation-z10'">
    <mat-card-header class="detail-wrapper__card-title mat-card-title">
      @if (basicImmunization) {
      <mat-card-title
        vmTranslate="BASIC_IMMUNIZATION.EDIT_HEADER"
        [attr.aria-label]="'BASIC_IMMUNIZATION.EDIT_HEADER' | translate"
      ></mat-card-title>
      } @else {
      <mat-card-title
        vmTranslate="BASIC_IMMUNIZATION.NEW_HEADER"
        [attr.aria-label]="'BASIC_IMMUNIZATION.NEW_HEADER' | translate"
      ></mat-card-title>
      }
    </mat-card-header>

    <mat-card-content class="detail-wrapper__card-content form-wrapper">
      <p class="form-hint" vmTranslate="BASIC_IMMUNIZATION.FORM_HINT"></p>
      <form
        [formGroup]="editForm"
        #formGroupDirective="ngForm"
        name="form"
        novalidate
        (ngSubmit)="save()"
        class="form-wrapper__form"
        role="form"
      >
        <vm-reusable-date-field
          [formControl]="editForm.controls.onsetDate"
          [labelTranslationKey]="'BASIC_IMMUNIZATION.ASSUMED_IMMUNIZATION_DATE'"
          [isEditable]="true"
          formControlName="onsetDate"
        ></vm-reusable-date-field>

        <vm-reusable-date-field
          [formControl]="editForm.controls.recordedDate"
          [labelTranslationKey]="'BASIC_IMMUNIZATION.DATE_OF_DETERMINATION'"
          [isEditable]="true"
          formControlName="recordedDate"
        ></vm-reusable-date-field>

        <vm-reusable-select-field-with-search
          #singleSelect
          [isRequired]="true"
          [options$]="basicImmunizationFilteredList"
          [item]="basicImmunization?.code!"
          [isEditable]="true"
          [translationKey]="'BASIC_IMMUNIZATION'"
          [labelKey]="'BASIC_IMMUNIZATION_CODE'"
          [formControl]="editForm.controls.code"
          formControlName="code"
        ></vm-reusable-select-field-with-search>

        @if (isMobile) {
        <mat-form-field class="detailed-card-content__form-field">
          <mat-label [attr.aria-label]="'GLOBAL.COMMENT' | translate" class="mat-label" vmTranslate="GLOBAL.COMMENT"></mat-label>
          <textarea
            matInput
            [value]="editForm.get('comment')?.value?.text || ''"
            (input)="commentMessage = $event.target.value"
            [attr.aria-label]="'GLOBAL.COMMENT' | translate"
            [placeholder]="'COMMENT.PLACEHOLDER' | translate"
          ></textarea>
        </mat-form-field>
        }

        <vm-reusable-select-field
          [formControl]="editForm.controls.confidentiality"
          [isEditable]="true"
          [placeholder]="'GLOBAL.CONFIDENTIALITY'"
          [options$]="confidentialityList"
          [translationKey]="'CONFIDENTIALITY'"
          [labelTranslationKey]="'GLOBAL.CONFIDENTIALITY'"
          [mainValueKey]="'CONFIDENTIALITY.' + basicImmunization?.confidentiality?.code! | translate"
          formControlName="confidentiality"
        ></vm-reusable-select-field>

        <vm-common-card-footer
          [isEditFooter]="true"
          [dialogTitle]="helpDialogTitle | translate"
          [dialogBody]="helpDialogBody | translate"
          (edit)="save()"
          [disabled]="editForm.invalid || isSaving"
        ></vm-common-card-footer>
      </form>
    </mat-card-content>
  </mat-card>
  <vm-comment
    class="detail-wrapper__comment"
    [(commentMessage)]="commentMessage"
    [comment]="basicImmunization?.comment!"
    [canAddComments]="true"
  ></vm-comment>
</div>
